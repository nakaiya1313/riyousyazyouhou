<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>メダカの針子 〜ビオトープ・サバイバル〜</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; overflow:hidden; background:#0a1f1a; font-family:-apple-system,'Hiragino Sans',sans-serif; }
  #wrap { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; background:#06120e; }
  canvas { display:block; touch-action:none; }

  /* Top fixed ad bar during gameplay */
  #topAd { position:absolute; top:0; left:0; right:0; z-index:6; display:none;
    justify-content:center; align-items:center; min-height:54px; max-height:60px; overflow:hidden;
    background:#06120e; border-bottom:1px solid rgba(120,200,170,0.25); }
  #topAd.show { display:flex; }
  #topAd > * { max-height:60px; }

  /* 忍者AdMaxが自動で出す画面下部の固定広告を非表示にする */
  body > div[id^="admax"],
  body > ins,
  iframe[src*="shinobi"]:not(#topAd iframe):not(#startAd iframe):not(#overAd iframe) {
    /* これだけでは効かない場合があるのでJSでも対処 */
  }

  /* Sound toggle */
  #soundBtn { position:absolute; bottom:16px; right:16px; z-index:7; width:48px; height:48px;
    border-radius:50%; border:1px solid rgba(140,220,180,0.4); background:rgba(8,28,22,0.7);
    color:#e0f7ec; font-size:22px; cursor:pointer; display:none; align-items:center; justify-content:center; }
  #soundBtn.show { display:flex; }

  /* Ad slot in start/over overlay */
  .ad-box { width:100%; max-width:340px; margin:6px 0 20px; min-height:60px;
    display:flex; align-items:center; justify-content:center; }

  .overlay { position:absolute; inset:0; display:none; flex-direction:column; justify-content:flex-start; align-items:center;
    text-align:center; color:#eafaf2; padding:32px 24px; z-index:10; overflow-y:auto;
    background:radial-gradient(ellipse at 50% 40%, rgba(20,60,45,0.82), rgba(4,14,10,0.94)); }
  .overlay.show { display:flex; }

  .game-title { font-size:28px; font-weight:800; letter-spacing:1px; color:#eafaf2; margin-bottom:4px; text-shadow:0 2px 14px rgba(0,0,0,0.7); }
  .game-sub { font-size:12px; color:#7fae9a; margin-bottom:18px; letter-spacing:3px; }

  .panel { background:rgba(10,30,24,0.55); border:1px solid rgba(120,200,170,0.22); border-radius:16px; padding:16px 18px; max-width:340px; margin-bottom:16px; }
  .panel p { font-size:13px; line-height:1.8; color:#cfeadd; }
  .panel .hi { color:#ffe08a; font-weight:700; }

  .legend { display:flex; flex-direction:column; gap:9px; margin:2px 0 16px; text-align:left; max-width:340px; }
  .legend-row { display:flex; align-items:center; gap:11px; font-size:12px; color:#cfeadd; line-height:1.35; }
  .legend-ic { width:30px; height:30px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .legend-ic img { max-width:100%; max-height:100%; }

  .btn { background:linear-gradient(135deg,#5bd9ac,#2fa37e); border:none; color:#06251b; font-size:19px; font-weight:800;
    padding:16px 50px; border-radius:40px; cursor:pointer; box-shadow:0 6px 24px rgba(79,209,165,0.5); letter-spacing:2px; transition:transform .1s; margin-bottom:20px; }
  .btn:active { transform:scale(.95); }

  .score-label { font-size:13px; color:#7fae9a; letter-spacing:4px; }
  .score-big { font-size:60px; font-weight:800; color:#ffe08a; margin:2px 0; line-height:1; }
  .best { font-size:15px; color:#cfeadd; margin-top:12px; }
  .new-record { font-size:16px; color:#ff9ed2; font-weight:800; margin-top:10px; animation:pop .5s ease; }
  @keyframes pop { from{transform:scale(0);} 60%{transform:scale(1.2);} to{transform:scale(1);} }

  #hud { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:96px 18px 0; pointer-events:none; z-index:5; }
  .hud-score { color:#eafaf2; font-size:27px; font-weight:800; text-shadow:0 2px 8px rgba(0,0,0,0.8); }
  .hud-score small { font-size:13px; font-weight:600; color:#a8d4c4; }
  .hud-buffs { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .buff-chip { background:rgba(8,28,22,0.72); border:1px solid rgba(140,220,180,0.4); color:#e0f7ec; font-size:12px; font-weight:700; padding:5px 12px; border-radius:20px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <!-- 上部固定広告（ゲーム中表示） -->
  <div id="topAd">
    <!-- admax -->
    <script src="https://adm.shinobi.jp/s/ba0cde15c0a2b3b3bad9797dafa295a1"></script>
    <!-- admax -->
  </div>

  <button id="soundBtn" onclick="toggleSound()">🔊</button>

  <div id="hud" style="display:none;">
    <div class="hud-score"><span id="hudScore">0.0</span><small> 秒</small></div>
    <div class="hud-buffs" id="hudBuffs"></div>
  </div>

  <div class="overlay show" id="startScreen">
    <div class="game-title">メダカの針子</div>
    <div class="game-sub">B I O T O P E　S U R V I V A L</div>
    <div class="panel">
      <p>卵からかえったばかりの<span class="hi">針子</span>。<br>
      指でなぞって泳がせ、<span class="hi">大人のメダカ</span>に<br>食べられないよう逃げ続けよう。</p>
    </div>
    <div class="legend" id="legend"></div>
    <button class="btn" onclick="startGame()">はじめる</button>
    <!-- スタート画面の広告枠 -->
    <div class="ad-box" id="startAd">
      <!-- admax -->
      <script src="https://adm.shinobi.jp/s/ba0cde15c0a2b3b3bad9797dafa295a1"></script>
      <!-- admax -->
    </div>
  </div>

  <div class="overlay" id="overScreen">
    <div class="score-label">いきのびた時間</div>
    <div class="score-big"><span id="finalScore">0</span><span style="font-size:24px;">秒</span></div>
    <div class="best" id="bestLine">ベスト記録: 0秒</div>
    <div id="recordLine"></div>
    <!-- ゲームオーバー画面の広告枠 -->
    <div class="ad-box" id="overAd">
      <!-- admax -->
      <script src="https://adm.shinobi.jp/s/ba0cde15c0a2b3b3bad9797dafa295a1"></script>
      <!-- admax -->
    </div>
    <div style="height:8px;"></div>
    <button class="btn" onclick="startGame()">もう一度</button>
  </div>
</div>

<script>
// ===== Audio (Web Audio synthesized) =====
let audioCtx = null;
let bgmTimer = null;
let soundOn = true;
let masterGain = null;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.5;
  masterGain.connect(audioCtx.destination);
}

function sfx(type){
  if(!soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  if(type==='item'){
    // rising chime
    [660, 880, 1100].forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(masterGain);
      const st=t+i*0.06;
      g.gain.setValueAtTime(0,st);
      g.gain.linearRampToValueAtTime(0.12,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.2);
      o.start(st); o.stop(st+0.22);
    });
  } else if(type==='hatch'){
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(700,t+0.25);
    o.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t); o.stop(t+0.32);
  } else if(type==='dash'){
    // warning whoosh
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.3);
    o.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t); o.stop(t+0.32);
  } else if(type==='caught'){
    // descending fail
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='square'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(80,t+0.5);
    o.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0.16,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    o.start(t); o.stop(t+0.62);
  }
}

// gentle ambient BGM: slow arpeggio in pentatonic
let bgmStep = 0;
const bgmNotes = [261.6, 293.7, 349.2, 392.0, 440.0, 392.0, 349.2, 293.7];
function startBGM(){
  if(!soundOn || !audioCtx) return;
  stopBGM();
  function playNote(){
    if(!soundOn || !audioCtx || state!=='playing') return;
    const t=audioCtx.currentTime;
    const f=bgmNotes[bgmStep % bgmNotes.length];
    bgmStep++;
    // soft pad note
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=f;
    o.connect(g); g.connect(masterGain);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.3);
    g.gain.linearRampToValueAtTime(0,t+1.1);
    o.start(t); o.stop(t+1.2);
    // bass every 4
    if(bgmStep%4===0){
      const ob=audioCtx.createOscillator(), gb=audioCtx.createGain();
      ob.type='triangle'; ob.frequency.value=f/2;
      ob.connect(gb); gb.connect(masterGain);
      gb.gain.setValueAtTime(0,t);
      gb.gain.linearRampToValueAtTime(0.2,t+0.2);
      gb.gain.linearRampToValueAtTime(0,t+1.4);
      ob.start(t); ob.stop(t+1.5);
    }
  }
  playNote();
  bgmTimer = setInterval(playNote, 600);
}
function stopBGM(){ if(bgmTimer){clearInterval(bgmTimer); bgmTimer=null;} }

function toggleSound(){
  soundOn = !soundOn;
  const btn=document.getElementById('soundBtn');
  if(btn) btn.textContent = soundOn ? '🔊' : '🔇';
  if(!soundOn) stopBGM();
  else if(state==='playing') startBGM();
}

// ===== Asset loading =====
const IMG = {};
let imagesLoaded = 0, imagesTotal = 0;
function loadImages(cb) {
  const keys = Object.keys(ASSETS);
  imagesTotal = keys.length;
  keys.forEach(k => {
    const img = new Image();
    img.onload = () => { imagesLoaded++; if (imagesLoaded >= imagesTotal) cb(); };
    img.onerror = () => { imagesLoaded++; if (imagesLoaded >= imagesTotal) cb(); };
    img.src = ASSETS[k];
    IMG[k] = img;
  });
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

// ===== Legend (built from images) =====
function buildLegend() {
  const rows = [
    ['oxygen','酸素：泡を取ると酸素が回復。酸素がゼロになると息切れ'],
    ['bait','エサ：大人メダカが食べに集まる。その隙に逃げろ'],
    ['speed','スピード：すばやく泳げる（酸素を少し消費）'],
    ['hide','かくれ身：少しの間つかまらない（酸素も少し回復）'],
  ];
  const el = document.getElementById('legend');
  el.innerHTML = rows.map(r =>
    `<div class="legend-row"><div class="legend-ic"><img src="${ASSETS[r[0]]}"></div><span>${r[1]}</span></div>`
  ).join('');
}

// ===== State =====
let state = 'start';
let startTime = 0, elapsed = 0, best = 0;
try { best = parseFloat(localStorage.getItem('medakaBestTD')||'0'); } catch(e){}

const fry = { x:0, y:0, vx:0, vy:0, r:14, target:null, hatched:false, hatchT:0, ang:0 };
let predators = [], items = [], obstacles = [], bubbles = [], particles = [];
let speedBuff=0, hideBuff=0, baitActive=0, baitX=0, baitY=0;
let spawnTimer=0, itemTimer=0;
let oxygen=100;            // 0-100
let globalSpeedMul=1;      // increases over time
let oxyItemTimer=0;        // separate spawn timer for oxygen items
let lowOxyWarned=false;

// ===== Obstacles (stones + hotei) =====
function initObstacles() {
  obstacles = [];
  const types = [
    {img:'stone2', r:40, solid:true},
    {img:'stone1', r:34, solid:true},
    {img:'stone4', r:30, solid:true},
    {img:'stone3', r:26, solid:true},
    {img:'hotei',  r:46, solid:false},
    {img:'hotei',  r:40, solid:false},
  ];
  const placed = [];
  types.forEach(t => {
    let tries=0, ok=false, x,y;
    while(!ok && tries<40){
      x = 60 + Math.random()*(W-120);
      y = 120 + Math.random()*(H-220);
      ok = true;
      for(const p of placed){ if(Math.hypot(x-p.x,y-p.y) < t.r+p.r+30){ok=false;break;} }
      // keep center clear for spawn
      if (Math.hypot(x-W/2,y-H/2) < 120) ok=false;
      tries++;
    }
    if(ok){ const o={x,y,...t,rot:Math.random()*Math.PI*2}; obstacles.push(o); placed.push(o); }
  });
}

// ===== Predator types =====
// chaser: straight pursuit. wanderer: roams, lunges when near.
// interceptor: aims ahead of fry. striker: roams, then lunges 3x fast when near.
function spawnPredator(typeForce) {
  const side = Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=25;y=Math.random()*H;}
  else if(side===1){x=W-25;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=25;}
  else{x=Math.random()*W;y=H-25;}

  let type = typeForce;
  if(!type){
    // weights shift with time: later → more interceptor/striker
    const t = elapsed;
    const r = Math.random();
    if(t < 12){ type = r<0.6?'chaser':(r<0.85?'wanderer':'interceptor'); }
    else if(t < 30){ type = r<0.4?'chaser':(r<0.62?'wanderer':(r<0.82?'interceptor':'striker')); }
    else { type = r<0.3?'chaser':(r<0.5?'wanderer':(r<0.72?'interceptor':'striker')); }
    // 先回り型は最大2匹までに制限（重なって同じ動きになるのを防ぐ）
    if(type==='interceptor'){
      const icount = predators.filter(p=>p.type==='interceptor').length;
      if(icount>=2) type = Math.random()<0.5?'chaser':'wanderer';
    }
  }

  const black = (type==='interceptor' || type==='striker') ? true : (Math.random()<0.3);
  const size = type==='striker' ? 26 : (22 + Math.random()*10);
  predators.push({
    x,y,vx:0,vy:0, type, size, ang:0,
    img: black?'medakaBlack':'medakaOrange',
    speed: type==='chaser'?1.0 : type==='wanderer'?0.8 : type==='interceptor'?1.05 : 1.0,
    wanderAng: Math.random()*Math.PI*2, wanderT:0,
    state:'idle', chargeT:0, dashVX:0, dashVY:0, alerted:false
  });
}

function spawnItem(forceType){
  let t;
  if(forceType){ t=forceType; }
  else {
    const r=Math.random();
    t = r<0.45?'bait':(r<0.78?'speed':'hide');
  }
  const m=60;
  let x,y,ok=false,tries=0;
  while(!ok && tries<30){
    x=m+Math.random()*(W-m*2); y=m+40+Math.random()*(H-m*2-60); ok=true;
    for(const o of obstacles){ if(o.solid && Math.hypot(x-o.x,y-o.y)<o.r+30){ok=false;break;} }
    tries++;
  }
  items.push({x,y,type:t,r:20,t:0,pulse:Math.random()*Math.PI*2});
}

// ===== Input =====
let pointerDown=false;
function setTarget(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  fry.target={x:t.clientX-rect.left, y:t.clientY-rect.top};
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown=true;setTarget(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();setTarget(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();pointerDown=false;},{passive:false});
canvas.addEventListener('mousedown',e=>{pointerDown=true;setTarget(e);});
canvas.addEventListener('mousemove',e=>{if(pointerDown)setTarget(e);});
canvas.addEventListener('mouseup',()=>{pointerDown=false;});

// ===== Start / Over =====
function startGame(){
  initAudio();
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  document.getElementById('startScreen').classList.remove('show');
  document.getElementById('overScreen').classList.remove('show');
  document.getElementById('hud').style.display='flex';
  document.getElementById('topAd').classList.add('show');
  document.getElementById('soundBtn').classList.add('show');
  state='playing'; startTime=performance.now(); elapsed=0;
  fry.x=W/2; fry.y=H/2; fry.vx=0; fry.vy=0; fry.target=null; fry.hatched=false; fry.hatchT=0; fry.ang=0;
  predators=[]; items=[]; particles=[];
  speedBuff=0; hideBuff=0; baitActive=0;
  spawnTimer=2.0; itemTimer=3.0; oxyItemTimer=2.0;
  oxygen=100; globalSpeedMul=1; lowOxyWarned=false;
  initObstacles(); initBubbles();
  bgmStep=0; startBGM();
}
function gameOver(){
  state='over';
  stopBGM();
  sfx('caught');
  document.getElementById('hud').style.display='none';
  document.getElementById('topAd').classList.remove('show');
  document.getElementById('soundBtn').classList.remove('show');
  const secs=elapsed.toFixed(1);
  document.getElementById('finalScore').textContent=secs;
  let rec=false;
  if(elapsed>best){best=elapsed;rec=true;try{localStorage.setItem('medakaBestTD',String(best));}catch(e){}}
  document.getElementById('bestLine').textContent='ベスト記録: '+best.toFixed(1)+'秒';
  document.getElementById('recordLine').innerHTML=rec?'<div class="new-record">🎉 自己ベスト更新！</div>':'';
  document.getElementById('overScreen').classList.add('show');
}

function initBubbles(){
  bubbles=[];
  for(let i=0;i<26;i++) bubbles.push({x:Math.random()*W,y:Math.random()*H,r:1+Math.random()*3,sp:0.15+Math.random()*0.5});
}

function burst(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color});}
}

// ===== Update =====
let lastT=performance.now();
function update(now){
  const dt=Math.min((now-lastT)/1000,0.05); lastT=now;
  bubbles.forEach(b=>{b.y-=b.sp; if(b.y<-5){b.y=H+5;b.x=Math.random()*W;}});

  if(state==='playing'){
    elapsed=(now-startTime)/1000;
    document.getElementById('hudScore').textContent=elapsed.toFixed(1);
    if(!fry.hatched){fry.hatchT+=dt; if(fry.hatchT>0.9){fry.hatched=true; sfx('hatch');}}

    // 数は時間経過でどんどん増える（上限なしに近い）
    const targetCount = Math.floor(3 + elapsed/4);
    spawnTimer-=dt;
    if(predators.length<targetCount && spawnTimer<=0){spawnPredator(); spawnTimer=0.5;}

    itemTimer-=dt;
    if(itemTimer<=0 && items.length<3){spawnItem(); itemTimer=3+Math.random()*2.5;}

    if(speedBuff>0)speedBuff-=dt;
    if(hideBuff>0)hideBuff-=dt;
    if(baitActive>0)baitActive-=dt;

    // === Oxygen: slowly depletes (beginner-friendly) ===
    oxygen -= dt * 2.4;            // ~42s to empty from full if no recovery
    // near water weed (hotei) → slight passive recovery
    for(const o of obstacles){
      if(!o.solid){ // hotei
        if(Math.hypot(fry.x-o.x,fry.y-o.y) < o.r+30){ oxygen += dt*4; break; }
      }
    }
    oxygen = Math.max(0, Math.min(100, oxygen));
    if(oxygen<=0){ burst(fry.x,fry.y,'160,200,255',20); gameOver(); }

    // === 大人メダカは時間経過でどんどん速くなる（上限なし） ===
    globalSpeedMul = 1 + elapsed*0.06;  // 30秒で+180%、60秒で+360%

    // oxygen item spawn (separate, always keep ~1 available)
    oxyItemTimer-=dt;
    const oxyCount = items.filter(it=>it.type==='oxygen').length;
    if(oxyItemTimer<=0 && oxyCount<1){ spawnItem('oxygen'); oxyItemTimer=4+Math.random()*2; }

    updateFry(dt); updatePredators(dt); updateItems(dt); updateHUD();
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;p.life-=dt*2;});
  particles=particles.filter(p=>p.life>0);

  draw();
  requestAnimationFrame(update);
}

function updateFry(dt){
  const accel = speedBuff>0?7.5:5;
  if(fry.target){
    const dx=fry.target.x-fry.x, dy=fry.target.y-fry.y;
    fry.vx += dx*accel*dt*0.9;
    fry.vy += dy*accel*dt*0.9;
  }
  fry.vx*=0.86; fry.vy*=0.86;
  const maxV=speedBuff>0?9.5:6;
  const v=Math.hypot(fry.vx,fry.vy);
  if(v>maxV){fry.vx=fry.vx/v*maxV; fry.vy=fry.vy/v*maxV;}

  let nx=fry.x+fry.vx, ny=fry.y+fry.vy;
  // collide with solid obstacles
  for(const o of obstacles){
    if(!o.solid)continue;
    const d=Math.hypot(nx-o.x,ny-o.y), min=o.r*0.8+fry.r;
    if(d<min){const a=Math.atan2(ny-o.y,nx-o.x); nx=o.x+Math.cos(a)*min; ny=o.y+Math.sin(a)*min; fry.vx*=0.5; fry.vy*=0.5;}
  }
  fry.x=Math.max(fry.r,Math.min(W-fry.r,nx));
  fry.y=Math.max(fry.r,Math.min(H-fry.r,ny));
  if(v>0.5) fry.ang=Math.atan2(fry.vy,fry.vx);
}

function updatePredators(dt){
  predators.forEach(p=>{
    const fdx=fry.x-p.x, fdy=fry.y-p.y;
    const fdist=Math.hypot(fdx,fdy)||1;
    let tx,ty, accel=p.speed;

    if(baitActive>0 && Math.hypot(baitX-p.x,baitY-p.y) < 320){
      // distracted by bait
      tx=baitX; ty=baitY; accel=p.speed*1.3;
    } else {
      if(p.type==='chaser'){
        tx=fry.x; ty=fry.y;
      } else if(p.type==='wanderer'){
        p.wanderT-=dt;
        if(fdist<160){ tx=fry.x; ty=fry.y; accel=p.speed*1.6; } // lunge
        else {
          if(p.wanderT<=0){p.wanderAng+=(Math.random()-0.5)*1.6; p.wanderT=0.6+Math.random()*0.8;}
          tx=p.x+Math.cos(p.wanderAng)*100; ty=p.y+Math.sin(p.wanderAng)*100; accel=p.speed*0.7;
        }
      } else if(p.type==='interceptor'){
        // aim ahead of fry based on its velocity
        const lead=Math.min(fdist/maxFrySpeed(), 0.9);
        tx=fry.x+fry.vx*18*lead; ty=fry.y+fry.vy*18*lead;
        accel=p.speed;
      } else { // striker: roams randomly, lunges FAST (3x) when fry is near
        p.wanderT-=dt;
        if(fdist<200){
          // fast attack
          tx=fry.x; ty=fry.y; accel=p.speed*3.0;
        } else {
          if(p.wanderT<=0){p.wanderAng+=(Math.random()-0.5)*1.8; p.wanderT=0.5+Math.random()*0.7;}
          tx=p.x+Math.cos(p.wanderAng)*100; ty=p.y+Math.sin(p.wanderAng)*100; accel=p.speed*0.85;
        }
      }
    }

    {
      const dx=tx-p.x, dy=ty-p.y, d=Math.hypot(dx,dy)||1;
      const sp=accel*globalSpeedMul*60*dt;
      p.vx+=(dx/d)*sp*0.06; p.vy+=(dy/d)*sp*0.06;

      // 画面内に留める力：端に近づくと中央へ押し返す
      const margin=70;
      if(p.x<margin) p.vx += (margin-p.x)*0.012;
      if(p.x>W-margin) p.vx -= (p.x-(W-margin))*0.012;
      if(p.y<margin) p.vy += (margin-p.y)*0.012;
      if(p.y>H-margin) p.vy -= (p.y-(H-margin))*0.012;

      p.vx*=0.9; p.vy*=0.9;
      // 速度上限（速くなりすぎても画面外へ飛び出さない）
      const vmax = 14*globalSpeedMul*0.5 + 6;
      const vv=Math.hypot(p.vx,p.vy);
      if(vv>vmax){p.vx=p.vx/vv*vmax; p.vy=p.vy/vv*vmax;}

      p.x+=p.vx; p.y+=p.vy;
      if(Math.hypot(p.vx,p.vy)>0.3) p.ang=Math.atan2(p.vy,p.vx);
    }

    // hard clamp inside screen
    p.x=Math.max(20,Math.min(W-20,p.x));
    p.y=Math.max(20,Math.min(H-20,p.y));

    // collision with fry
    if(state==='playing' && fry.hatched && hideBuff<=0){
      const hitDist = p.size*0.5 + fry.r*0.6;
      if(fdist < hitDist){
        burst(fry.x,fry.y,'255,140,90',22);
        gameOver();
      }
    }
  });
}
function maxFrySpeed(){return speedBuff>0?9.5:6;}

function updateItems(dt){
  for(let i=items.length-1;i>=0;i--){
    const it=items[i]; it.t+=dt; it.pulse+=dt*3;
    if(Math.hypot(fry.x-it.x,fry.y-it.y) < it.r+fry.r){
      if(it.type==='speed'){ speedBuff=4.5; oxygen=Math.max(0,oxygen-3); burst(it.x,it.y,'255,120,90',16); } // speed costs tiny oxygen
      else if(it.type==='hide'){ hideBuff=2.8; oxygen=Math.min(100,oxygen+6); burst(it.x,it.y,'120,220,140',16); } // hide gives slight oxygen
      else if(it.type==='oxygen'){ oxygen=Math.min(100,oxygen+45); burst(it.x,it.y,'200,230,255',18); }
      else { baitActive=4; baitX=it.x; baitY=it.y; burst(it.x,it.y,'255,150,90',16); }
      sfx('item');
      items.splice(i,1); continue;
    }
    const maxLife = it.type==='oxygen'?16:10;
    if(it.t>maxLife)items.splice(i,1);
  }
}

function updateHUD(){
  let h='';
  if(speedBuff>0)h+=`<div class="buff-chip">⚡ スピード ${speedBuff.toFixed(1)}</div>`;
  if(hideBuff>0)h+=`<div class="buff-chip">🫧 かくれ身 ${hideBuff.toFixed(1)}</div>`;
  if(baitActive>0)h+=`<div class="buff-chip">🍤 エサ作動 ${baitActive.toFixed(1)}</div>`;
  document.getElementById('hudBuffs').innerHTML=h;
}

// ===== Draw =====
let bgPattern=null;
function draw(){
  // background image cover
  if(IMG.bg && IMG.bg.complete && IMG.bg.naturalWidth){
    drawCover(IMG.bg);
  } else {
    ctx.fillStyle='#1a4d3e'; ctx.fillRect(0,0,W,H);
  }
  // subtle darkening for contrast
  ctx.fillStyle='rgba(8,30,22,0.18)'; ctx.fillRect(0,0,W,H);

  // bubbles
  bubbles.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle='rgba(220,250,240,0.16)';ctx.fill();});

  // obstacles under
  obstacles.forEach(o=>{ if(o.solid) drawObstacle(o); });

  // items
  items.forEach(drawItem);

  // bait marker
  if(baitActive>0){
    ctx.save();
    const pl=1+Math.sin(performance.now()/110)*0.18;
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.arc(baitX,baitY,30*pl,0,Math.PI*2);
    ctx.fillStyle='rgba(255,150,90,0.22)';ctx.fill();
    if(IMG.bait) drawImgC(IMG.bait,baitX,baitY,42,0);
    ctx.restore();
  }

  // fry
  if(state==='playing'||state==='over') drawFry();

  // predators
  predators.forEach(drawPredator);

  // hotei (floating plants) ON TOP — they float above
  obstacles.forEach(o=>{ if(!o.solid) drawObstacle(o); });

  // particles
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='rgb('+p.color+')';ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  if(state==='playing') drawOxygenBar();
}

function drawOxygenBar(){
  const barW = Math.min(W*0.5, 220);
  const barH = 14;
  const x = (W-barW)/2;
  const y = 70; // below top ad bar
  // label
  ctx.save();
  ctx.font='bold 12px sans-serif'; ctx.fillStyle='#dff3ec'; ctx.textAlign='center';
  ctx.fillText('酸素', W/2, y-6);
  // track
  ctx.fillStyle='rgba(6,20,16,0.6)';
  roundRect(x,y,barW,barH,7); ctx.fill();
  // fill color by level
  const pct = oxygen/100;
  let col = pct>0.5 ? '#4fd1e0' : pct>0.25 ? '#ffcf4a' : '#ff5a4a';
  ctx.fillStyle=col;
  roundRect(x+2,y+2,(barW-4)*pct,barH-4,5); ctx.fill();
  // low warning blink
  if(pct<=0.25){
    const a=0.4+Math.sin(performance.now()/120)*0.4;
    ctx.globalAlpha=Math.max(0,a);
    ctx.strokeStyle='#ff5a4a'; ctx.lineWidth=2;
    roundRect(x,y,barW,barH,7); ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  if(w<2*r)r=w/2; if(h<2*r)r=h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawCover(img){
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const scale=Math.max(W/iw,H/ih);
  const w=iw*scale, h=ih*scale;
  ctx.drawImage(img,(W-w)/2,(H-h)/2,w,h);
}

function drawImgC(img,x,y,size,ang){
  if(!img||!img.complete||!img.naturalWidth)return;
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const s=size/Math.max(iw,ih);
  const w=iw*s,h=ih*s;
  ctx.save();ctx.translate(x,y);if(ang)ctx.rotate(ang);
  ctx.drawImage(img,-w/2,-h/2,w,h);ctx.restore();
}

function drawObstacle(o){
  const img=IMG[o.img];
  if(img&&img.complete&&img.naturalWidth){
    if(!o.solid){ // hotei shadow
      ctx.save();ctx.globalAlpha=0.25;ctx.beginPath();ctx.arc(o.x,o.y+6,o.r,0,Math.PI*2);ctx.fillStyle='#06150f';ctx.fill();ctx.restore();
    }
    drawImgC(img,o.x,o.y,o.r*2.2,o.rot);
  } else {
    ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
    ctx.fillStyle=o.solid?'#888':'#4a8';ctx.fill();
  }
}

function drawFry(){
  ctx.save();
  // hatch egg shell fade
  if(!fry.hatched){
    const k=fry.hatchT/0.9;
    if(IMG.egg){ctx.globalAlpha=1-k;drawImgC(IMG.egg,fry.x,fry.y,46,0);ctx.globalAlpha=1;}
  }
  let alpha=1;
  if(hideBuff>0) alpha=0.4+Math.sin(performance.now()/100)*0.12;
  ctx.globalAlpha=alpha;
  // fry image points "up" (12 o'clock) → rotate so up aligns to movement angle
  drawImgC(IMG.fry, fry.x, fry.y, 38, fry.ang+Math.PI/2);
  ctx.restore();
}

function drawPredator(p){
  ctx.save();
  // striker attack tell: red glow when lunging at nearby fry
  if(p.type==='striker'){
    const fdist=Math.hypot(fry.x-p.x, fry.y-p.y);
    if(fdist<200 && fry.hatched){
      const f=0.5+Math.sin(performance.now()/80)*0.5;
      ctx.globalAlpha=0.25*f;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,90,90,0.7)';ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  drawImgC(IMG[p.img], p.x, p.y, p.size*2.4, p.ang+Math.PI/2);
  ctx.restore();
}

function drawItem(it){
  const map={speed:'speed',hide:'hide',bait:'bait',oxygen:'oxygen'};
  const glow={speed:'255,120,90',hide:'120,220,140',bait:'255,150,90',oxygen:'200,230,255'};
  const sizeMul={speed:2.4,hide:2.4,bait:2.2,oxygen:2.2};
  const pulse=1+Math.sin(it.pulse)*0.12;
  ctx.save();
  ctx.globalAlpha=0.35;
  ctx.beginPath();ctx.arc(it.x,it.y,it.r*pulse+8,0,Math.PI*2);
  ctx.fillStyle=`rgba(${glow[it.type]},0.3)`;ctx.fill();
  ctx.globalAlpha=1;
  if(it.t>8) ctx.globalAlpha=Math.max(0,1-(it.t-8)/2);
  drawImgC(IMG[map[it.type]], it.x, it.y, it.r*(sizeMul[it.type]||2.2)*pulse, 0);
  ctx.restore();
}

// ===== Boot =====
buildLegend();

// 忍者AdMaxが自動挿入する画面下部の固定広告を監視して隠す
// （自分で配置した #topAd / #startAd / #overAd 内の広告は残す）
function hideInjectedAds(){
  const ourAds = ['topAd','startAd','overAd'];
  document.querySelectorAll('body *').forEach(el=>{
    if(el.tagName!=='IFRAME' && el.tagName!=='INS' && el.tagName!=='DIV') return;
    // 自分の広告枠の中にある要素はスキップ
    let inOurs=false, n=el;
    while(n){ if(ourAds.includes(n.id)){inOurs=true;break;} n=n.parentElement; }
    if(inOurs) return;
    const st=window.getComputedStyle(el);
    // position:fixed で画面下部に貼り付く広告を非表示
    if(st.position==='fixed'){
      const rect=el.getBoundingClientRect();
      // 画面下半分にある固定要素＝自動挿入広告とみなす（soundBtnは除外）
      if(el.id!=='soundBtn' && rect.top > window.innerHeight*0.4){
        el.style.setProperty('display','none','important');
      }
    }
  });
}
setInterval(hideInjectedAds, 500);

loadImages(()=>{ /* images ready */ });
requestAnimationFrame(update);

</script>
